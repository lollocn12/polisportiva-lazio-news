name: Aggrega notizie Polisportiva

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installa le dipendenze
        run: npm install

      - name: Genera il bundle di notizie
        run: npm start

      - name: Pubblica il JSON aggiornato
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add docs/notizie.json
          git diff --quiet --cached || git commit -m "Aggiorna notizie aggregate"
          git push
